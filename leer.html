<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscador Directo</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-white text-slate-800 p-8">

    <div id="display" class="text-2xl font-medium"></div>

    <script>
        const CONFIG = {
            URL: "https://script.google.com/macros/s/AKfycbwhekogIPHfArkHFhHMtrTsKJBHwpYxaPcF7lsR6bPrrEslgngDiEn_83N1jpPIzTzU/exec",
            dato: 400 // Dato de ejemplo configurado directamente
        };

        async function BuscarSheets() {
            try {
                const response = await fetch(CONFIG.URL, {
                    method: 'GET',
                    redirect: 'follow'
                });
                
                const data = await response.json();
                const display = document.getElementById('display');

                // Recorremos las filas buscando el dato en la columna 1 (índice 0)
                for (let i = 0; i < data.length; i++) {
                    if (data[i][0] == CONFIG.dato) {
                        // Si lo encuentra, muestra el valor de la columna 2 (índice 1)
                        display.textContent = data[i][1];
                        break;
                    }
                }
            } catch (err) {
                // Si falla o no encuentra nada, la página permanece en blanco
            }
        }

        window.onload = BuscarSheets;
    </script>
</body>
</html>
